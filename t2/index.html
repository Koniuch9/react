<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kursik</title>
    <script src="https://unpkg.com/react@17/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            background-color: gray;
        }

        .App {
            font-family: sans-serif;
        }

        .TimeboxEditor {
            text-align: right;
            border: 1px solid black;
            border-radius: 5px;
            padding: 20px;
            margin-bottom: 20px;
        }

        input {
            min-width: 60%;
            margin-left: 20px;
            font-size: 16px;
            background-color: #dadada;
        }

        button {
            font-size: 16px;
            margin-left: 10px;
            border: 2px solid rgb(26, 91, 211);
            border-radius: 10px;
            background-color: cadetblue;
            margin-top: 10px;
        }

        .Timebox {
            border: 1px solid black;
            border-radius: 5px;
            padding: 20px;
            text-align: center;
        }

        .Clock {
            color:rgb(26, 91, 211);
        }

        .ProgressBar {
            border: 1px solid rgb(26, 91, 211);
            border-radius: 5px;
            height: 25px;
            margin-bottom: 20px;
            padding: 5px;
        }

        .ProgressBar > div {
            height: 100%;
            background-color: rgb(26, 91, 211);
        }

        .inactive {
            filter: blur(2px) grayscale(1);
        }
    </style>
</head>
<body>
    <div id="root"></div>    
</body>
<script type="text/babel">

    function formatClock(value) {
        return ('0' + value).slice(-2)
    }

    function ProgressBar({className, percent = 33}) {
        return (
            <div className={"ProgressBar " + className}>
                <div style={{width: `${percent}%`}}></div>
            </div>
        );
    }

    function Clock({className, seconds = 0}) {
        return (
            <h2 className={"Clock " + className}>
            Pozostało {formatClock(seconds / 60 >> 0)}:{formatClock(seconds % 60)}
            </h2>
        );
    }

    function TimeboxEditor() {
        return (
        <div className="TimeboxEditor">
            <label>Co robisz? <input value="Trolowando" type="text"/></label><br/>
            <label>Ile minut? <input value="20" type="number"/></label><br/>
            <button>Zacznij</button>
        </div>
        );
    }

    class Timebox extends React.Component {

        constructor(props) {
            super(props);
            this.state = {
                isRunning: false,
                isPaused: false,
                pausesCount: 0,
                timeElapsed: 0
            }
            this.handleStart = this.handleStart.bind(this)
            this.handleStop = this.handleStop.bind(this)
            this.handlePause = this.handlePause.bind(this)
            this.totalTime = 67;
        }

        handlePause(event) {
            this.setState(
                function(prev) {
                    if (prev.isPaused) {
                        this.startTimer();
                    } else {
                        this.stopTimer();                        
                    }
                    return {
                        isPaused: !prev.isPaused,
                        pausesCount: prev.isPaused ? prev.pausesCount : prev.pausesCount + 1
                    }
                }
            );
            
        }

        handleStart(event) {
            this.setState({
                isRunning: true
            });
            this.startTimer();
        }

        handleStop(event) {
            this.setState({
                isRunning: false,
                isPaused: false,
                pausesCount: 0,
                timeElapsed: 0
            });
            this.stopTimer();
        }

        startTimer() {
            this.intervalId = window.setInterval(
                () => {
                    this.setState(
                        (prev) => ({timeElapsed: prev.timeElapsed + .1})
                    )
                },
                100
            );
        }

        stopTimer() {
            window.clearInterval(this.intervalId);
        }

        render() {
            const {isPaused, isRunning, pausesCount, timeElapsed} = this.state;
            const total = this.totalTime;
            return (
            <div className="Timebox">
                <h1>Trolowando</h1>
                <Clock className={isPaused ? "inactive" : ""} seconds={total - Math.floor(timeElapsed)} />
                <ProgressBar className={isPaused ? "inactive" : ""} percent={timeElapsed / total * 100} />
                <button onClick={this.handleStart} disabled={isRunning}>Start</button>
                <button onClick={this.handleStop} disabled={!isRunning}>Stop</button>
                <button onClick={this.handlePause} disabled={!isRunning}>{!isPaused ? "Pauza" : "Wznów"}</button>
                <br /><br />
                Liczba przerw: {pausesCount} 
            </div>
            );
        }
    }

    function App() {
        return (
        <div className="App">
            <TimeboxEditor />
            <Timebox />
        </div>
        );
    }
    const rootE = document.getElementById("root");
    ReactDOM.render(<App />, rootE);
</script>
</html>
